name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup Windows SDK environment
      shell: cmd
      run: |
        call "%ProgramFiles(x86)%\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat"

    - name: Clone foobar2000 SDK
      uses: actions/checkout@v4
      with:
        repository: reupen/foobar2000-sdk-unmodified
        path: lib/foobar2000_SDK

    - name: Clone sonic
      uses: actions/checkout@v4
      with:
        repository: waywardgeek/sonic
        path: lib/sonic_repo

    - name: Clone speedy
      uses: actions/checkout@v4
      with:
        repository: google/speedy
        path: lib/speedy_repo

    - name: Clone kissfft
      uses: actions/checkout@v4
      with:
        repository: mborgerding/kissfft
        path: lib/kissfft

    - name: Fix Platform Toolset
      shell: pwsh
      run: |
        Get-ChildItem -Recurse -Filter *.vcxproj | ForEach-Object {
          $content = Get-Content $_.FullName -Raw

          $content = $content -replace 'v140', 'v143'
          $content = $content -replace 'v141', 'v143'
          $content = $content -replace 'v142', 'v143'

          Set-Content $_.FullName $content -NoNewline
        }

    - name: Build Win32 Release
      shell: cmd
      run: |
        msbuild foo_dsp_speedy.sln ^
          /p:Configuration=Release ^
          /p:Platform=Win32 ^
          /p:PlatformToolset=v143 ^
          /m ^
          /verbosity:minimal

    - name: Build x64 Release
      shell: cmd
      run: |
        msbuild foo_dsp_speedy.sln ^
          /p:Configuration=Release ^
          /p:Platform=x64 ^
          /p:PlatformToolset=v143 ^
          /m ^
          /verbosity:minimal

    - name: Create fb2k-component package
      shell: pwsh
      run: |
        $commitHash = git rev-parse --short HEAD
        $version = "manual-$commitHash"

        $stageDir = "staging"

        New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
        New-Item -ItemType Directory -Force -Path "$stageDir\x64" | Out-Null
        New-Item -ItemType Directory -Force -Path "release" | Out-Null

        # 查找 Win32 DLL
        $win32Dll = @(
          "Release\foo_dsp_speedy.dll",
          "bin\Release\Win32\foo_dsp_speedy.dll",
          "Win32\Release\foo_dsp_speedy.dll"
        ) | Where-Object { Test-Path $_ } | Select-Object -First 1

        if (-not $win32Dll) {
          Write-Error "Cannot find Win32 DLL"
          exit 1
        }

        Copy-Item $win32Dll "$stageDir\foo_dsp_speedy.dll"

        # 查找 x64 DLL
        $x64Dll = @(
          "x64\Release\foo_dsp_speedy.dll",
          "bin\Release\x64\foo_dsp_speedy.dll"
        ) | Where-Object { Test-Path $_ } | Select-Object -First 1

        if (-not $x64Dll) {
          Write-Error "Cannot find x64 DLL"
          exit 1
        }

        Copy-Item $x64Dll "$stageDir\x64\foo_dsp_speedy.dll"

        # 创建版本包
        $zipPath = "release\foo_dsp_speedy-$version.zip"
        $componentPath = "release\foo_dsp_speedy-$version.fb2k-component"

        Compress-Archive -Path "$stageDir\*" -DestinationPath $zipPath -Force
        Move-Item $zipPath $componentPath -Force

        # 创建 latest 包
        $latestZip = "release\foo_dsp_speedy-latest.zip"
        $latestComponent = "release\foo_dsp_speedy-latest.fb2k-component"

        Compress-Archive -Path "$stageDir\*" -DestinationPath $latestZip -Force
        Move-Item $latestZip $latestComponent -Force

        Write-Host ""
        Write-Host "Created packages:"
        Get-ChildItem release\*.fb2k-component

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: foo_dsp_speedy
        path: release/*.fb2k-component
        retention-days: 90

    - name: Update latest release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Build
        body: |
          Manual build from commit ${{ github.sha }}

          ## Installation
          1. Download `foo_dsp_speedy-latest.fb2k-component`
          2. Double-click to install, or drag onto foobar2000

          ## Features
          - Speed control (0.25x - 4.0x)
          - Pitch control (0.5x - 2.0x)
          - Nonlinear speech acceleration
          - Supports both 32-bit and 64-bit foobar2000

        files: release/*.fb2k-component
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}