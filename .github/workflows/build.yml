name: Build and Release

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Clone dependencies
      uses: actions/checkout@v4
      with:
        repository: reupen/foobar2000-sdk-unmodified
        path: lib/foobar2000_SDK

    - name: Clone sonic
      uses: actions/checkout@v4
      with:
        repository: waywardgeek/sonic
        path: lib/sonic_repo

    - name: Clone speedy
      uses: actions/checkout@v4
      with:
        repository: google/speedy
        path: lib/speedy_repo

    - name: Clone kissfft
      uses: actions/checkout@v4
      with:
        repository: mborgerding/kissfft
        path: lib/kissfft

    - name: Fix resource compiler issue - add Windows controls header
      shell: pwsh
      run: |
        $rcFile = "src/foo_dsp_speedy.rc"
        if (Test-Path $rcFile) {
          $content = Get-Content $rcFile -Raw
          if ($content -notmatch '#include <windows.h>' -and $content -notmatch '#include "windows.h"') {
            $newContent = "#include <windows.h>`n#include <commctrl.h>`n`n" + $content
            Set-Content $rcFile $newContent -NoNewline
            Write-Host "Fixed $rcFile"
          }
        }

    - name: Fix Platform Toolset for GitHub Actions
      shell: pwsh
      run: |
        Get-ChildItem -Recurse -Filter *.vcxproj | ForEach-Object {
          $content = Get-Content $_.FullName -Raw
          if ($content -match 'v14[0-9]+') {
            Write-Host "Fixing: $($_.Name)"
            $content -replace 'v14[0-9]+', 'v143' | Set-Content $_.FullName -NoNewline
          }
        }

    - name: Build Win32 Release
      shell: cmd
      run: |
        msbuild foo_dsp_speedy.sln -p:Configuration=Release -p:Platform=Win32 -p:PlatformToolset=v143 -verbosity:minimal

    - name: Build x64 Release
      shell: cmd
      run: |
        msbuild foo_dsp_speedy.sln -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143 -verbosity:minimal

    - name: Create fb2k-component package
      shell: pwsh
      run: |
        $commitHash = git rev-parse --short HEAD
        $version = "latest-$commitHash"

        $stageDir = "staging"
        New-Item -ItemType Directory -Force -Path $stageDir
        New-Item -ItemType Directory -Force -Path "$stageDir/x64"

        if (Test-Path "bin/Release/Win32/foo_dsp_speedy.dll") {
          Copy-Item "bin/Release/Win32/foo_dsp_speedy.dll" "$stageDir/foo_dsp_speedy.dll"
        } elseif (Test-Path "Release/foo_dsp_speedy.dll") {
          Copy-Item "Release/foo_dsp_speedy.dll" "$stageDir/foo_dsp_speedy.dll"
        } else {
          Write-Host "ERROR: Cannot find foo_dsp_speedy.dll for Win32"
          exit 1
        }

        if (Test-Path "bin/Release/x64/foo_dsp_speedy.dll") {
          Copy-Item "bin/Release/x64/foo_dsp_speedy.dll" "$stageDir/x64/foo_dsp_speedy.dll"
        } elseif (Test-Path "x64/Release/foo_dsp_speedy.dll") {
          Copy-Item "x64/Release/foo_dsp_speedy.dll" "$stageDir/x64/foo_dsp_speedy.dll"
        } else {
          Write-Host "ERROR: Cannot find foo_dsp_speedy.dll for x64"
          exit 1
        }

        New-Item -ItemType Directory -Force -Path "release"

        $zipPath = "release/foo_dsp_speedy-$version.zip"
        $componentPath = "release/foo_dsp_speedy-$version.fb2k-component"
        Compress-Archive -Path "$stageDir/*" -DestinationPath $zipPath -Force
        Move-Item $zipPath $componentPath -Force

        $latestZip = "release/foo_dsp_speedy-latest.zip"
        $latestComponent = "release/foo_dsp_speedy-latest.fb2k-component"
        Compress-Archive -Path "$stageDir/*" -DestinationPath $latestZip -Force
        Move-Item $latestZip $latestComponent -Force

        Write-Host "Created packages:"
        Get-ChildItem release/*.fb2k-component

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: foo_dsp_speedy
        path: release/*.fb2k-component
        retention-days: 90

    - name: Update latest release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Build
        body: |
          Automatic build from commit ${{ github.sha }}

          ## Installation
          1. Download `foo_dsp_speedy-latest.fb2k-component`
          2. Double-click to install, or drag onto foobar2000

          ## Features
          - Speed control (0.25x - 4.0x)
          - Pitch control (0.5x - 2.0x)
          - Nonlinear speedup mode for speech (Google Speedy/Mach1 algorithm)
          - Supports both 32-bit and 64-bit foobar2000
        files: release/*.fb2k-component
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}